services:
  - type: web
    name: rakuten-bulk-editor
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: ""
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
